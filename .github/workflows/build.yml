name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install akshare pandas numpy requests lxml openpyxl aiohttp

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller main.py --onefile --name auto_trader --distpath dist --workpath build --specpath packaging --add-data "stock_pool.json;." --hidden-import=akshare --hidden-import=akshare.stock --hidden-import=akshare.stock.stock_zh_a_spot_em --hidden-import=akshare.stock.stock_zh_a_hist --hidden-import=akshare.cons --hidden-import=akshare.pro --hidden-import=akshare.pro.data_pro --hidden-import=pandas --hidden-import=numpy --hidden-import=requests --hidden-import=urllib3 --hidden-import=lxml --hidden-import=openpyxl --hidden-import=aiohttp --hidden-import=concurrent.futures --hidden-import=queue --hidden-import=certifi --hidden-import=charset_normalizer --hidden-import=idna --hidden-import=python_dateutil --hidden-import=pytz --hidden-import=six --hidden-import=dateutil

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: auto_trader_windows_exe
        path: dist/auto_trader.exe
        retention-days: 30
